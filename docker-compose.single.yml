version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - "${PORT:-2233}:5000"
    environment:
      - ASPNETCORE_URLS=http://+:5000
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
