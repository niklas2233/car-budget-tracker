services:
  # Single container hosting both frontend and API
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    container_name: carbudget-app
    ports:
      - 2233:2233
    environment:
      webui_port: 2233
      region: sweden
      # currency: SEK   # override currency symbol (default derived from region: SEK/NOK/EUR)
      # debug: "false"  # set to "true" to save Playwright HTML on each lookup
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  data:
