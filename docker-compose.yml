services:
  # Single container hosting both frontend and API
  app:
    build:
      context: .
      dockerfile: Dockerfile.single
    ports:
      - ${webui_port:-2233}:${webui_port:-2233}
    environment:
      - webui_port=2233
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes:
  data:
